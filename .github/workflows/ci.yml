name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript type check
        run: npx tsc --noEmit
        
      - name: Build frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          # Add other necessary VITE_* secrets here as needed
          
      - name: Check for secrets in code
        run: |
          # Fail if any known secret patterns found
          if grep -rn "ea88b1c8\|qbp4h191y1\|Aniket@371" --include="*.ts" --include="*.tsx" .; then
            echo "SECURITY: Hardcoded secrets found in code!"
            exit 1
          fi