version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://aapa:aapa@postgres:5432/aapa_db
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aapa
      POSTGRES_PASSWORD: aapa
      POSTGRES_DB: aapa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aapa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: